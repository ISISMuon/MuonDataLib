name: Build and upload to PyPI

on:
  push:
    branches:
    - 'main'

permissions:
  contents: write

jobs:
  update_version:
    name: update version
    runs-on: ubuntu-slim
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: "1"
      - name: Update version on merge
        run:  |
            python tools/version.py "beta"
      - name: Store changes
        uses: actions/upload-artifact@v4
        with:
          name: pyproject
          path: |
            ./pyproject.toml
            ./setup.py

  build:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
    needs: [update_version]
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: "1"
      - uses: actions/download-artifact@v4
        with:
          name: pyproject

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1
        env:
          # List of platforms to build on (incl. Python version)
          CIBW_BUILD: >
            cp3{10,11,12,13}-manylinux_x86_64
            cp3{10,11,12,13}-macosx_x86_64
            cp3{10,11,12,13}-macosx_arm64
            cp3{10,11,12,13}-win_amd64
          CIBW_BEFORE_BUILD: >
             pip install numpy Cython
          # Install test dependencies and run tests
          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: >
            pytest {project}/test -k "not load_and_save_test"
      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    needs: [update_version]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: pyproject

      - name: Build sdist
        run: |
          pip install numpy Cython
          python setup.py sdist
      - uses: actions/upload-artifact@v4
        with:
          name: src
          path: dist/*.tar.gz

  upload_pypi:
    needs: [build, build_sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: src
          path: dist
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Publish package distribution to PYPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

  update_setup:
    needs: [upload_pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: "1"

      - uses: actions/download-artifact@v4
        with:
          name: pyproject
      - name: check
        run: |
          cat pyproject.toml

      - uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions
          author_email: github-actions@github.com
          message: "update version number"
          add: |
            - pyproject.toml
            - setup.py'
