name: moomoo

channels:
  - conda-forge

dependencies:
  - python =3.11.*
  - numpy
  - plotly = 6.0.1
  - pytest
  - pre-commit >=2.15
  - sphinx
  - jupyter-book
  - nbsphinx
  - selenium
  - pip:
    - readthedocs-sphinx-ext
    - dash[testing]
    - dash-ag-grid==32.3.4
    - dash_bootstrap_components
    - sphinx-rtd-theme
    - pyqt6
    - PyQt6-WebEngine
    - dash_daq

